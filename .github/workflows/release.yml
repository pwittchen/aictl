name: RELEASE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml, Cargo.lock, and website version if needed
        run: |
          # Workspace `version` lives under [workspace.package] in the root
          # Cargo.toml; both crates inherit it via `version.workspace = true`.
          # Flag-based section parsing (not an awk range) — `[workspace.package]`
          # is the last section in Cargo.toml, so a `addr1,addr2` range where
          # both addresses match `^\[` collapses to a single line.
          current=$(awk '
            /^\[workspace\.package\]/ { in_section=1; next }
            in_section && /^\[/ { in_section=0 }
            in_section && /^version *= *"/ {
              sub(/^version *= *"/, ""); sub(/".*$/, ""); print; exit
            }
          ' Cargo.toml)
          tag_version="${{ steps.version.outputs.version }}"
          changed=0
          if [ "$current" != "$tag_version" ]; then
            # Bump the single source of truth at the workspace root.
            awk -v new="$tag_version" '
              /^\[workspace\.package\]/ { in_section=1; print; next }
              in_section && /^\[/ { in_section=0 }
              in_section && /^version *= *"/ { print "version = \"" new "\""; next }
              { print }
            ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
            # Cargo.lock has one entry per workspace member.
            sed -i '/^name = "aictl-cli"$/{n;s/^version = ".*"$/version = "'"$tag_version"'"/;}' Cargo.lock
            sed -i '/^name = "aictl-core"$/{n;s/^version = ".*"$/version = "'"$tag_version"'"/;}' Cargo.lock
            sed -i '/^name = "aictl-server"$/{n;s/^version = ".*"$/version = "'"$tag_version"'"/;}' Cargo.lock
            changed=1
          fi
          if ! grep -q "v$tag_version ·" website/index.html; then
            sed -i "s/v[0-9][0-9.]*\( ·[^<]*<\/div>\)/v$tag_version\1/" website/index.html
            changed=1
          fi
          if ! grep -q "v$tag_version ·" website/guides.html; then
            sed -i "s/v[0-9][0-9.]*\( ·[^<]*<\/div>\)/v$tag_version\1/" website/guides.html
            changed=1
          fi
          if ! grep -q "v$tag_version ·" website/server.html; then
            sed -i "s/v[0-9][0-9.]*\( ·[^<]*<\/div>\)/v$tag_version\1/" website/server.html
            changed=1
          fi
          if [ "$changed" = "1" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock website/index.html website/guides.html website/server.html
            git commit -m "Bump version to $tag_version"
            git push origin HEAD:master
          fi

  build:
    needs: version-bump
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: aictl-linux-x86_64
            server_artifact: aictl-server-linux-x86_64
            features: gguf redaction-ner
            server_features: redaction-ner
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: aictl-linux-aarch64
            server_artifact: aictl-server-linux-aarch64
            features: gguf redaction-ner
            server_features: redaction-ner
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: aictl-darwin-x86_64
            server_artifact: aictl-server-darwin-x86_64
            features: gguf redaction-ner
            server_features: redaction-ner
          - target: aarch64-apple-darwin
            os: macos-15
            artifact: aictl-darwin-aarch64
            server_artifact: aictl-server-darwin-aarch64
            features: gguf mlx redaction-ner
            server_features: redaction-ner
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux dependencies
        if: contains(matrix.target, 'linux')
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config cmake build-essential

      - name: Install macOS dependencies
        if: contains(matrix.os, 'macos')
        run: brew install cmake

      - name: Select Xcode 16.4
        if: matrix.target == 'aarch64-apple-darwin'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.features }}-${{ matrix.server_features }}

      - name: Build aictl (CLI)
        run: cargo build --release -p aictl-cli --features "${{ matrix.features }}" --target ${{ matrix.target }}

      - name: Build aictl-server
        # Server is the LLM proxy — no inference (`gguf` / `mlx`) needed,
        # so it ships much smaller than the CLI. `redaction-ner` is kept
        # because the server applies the same outbound redaction on the
        # proxy path that the CLI does at the network boundary.
        run: cargo build --release -p aictl-server --features "${{ matrix.server_features }}" --target ${{ matrix.target }}

      - name: Package aictl (CLI)
        shell: bash
        run: |
          bin_src="target/${{ matrix.target }}/release/aictl"
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            # MLX bakes an absolute METAL_PATH into the binary at compile time
            # pointing to the CI runner's build dir. That path vanishes when the
            # runner exits, so we ship mlx.metallib next to the binary — MLX's
            # first runtime fallback is <exec_dir>/mlx.metallib.
            metallib=$(find "target/${{ matrix.target }}/release/build" -type f -name mlx.metallib -print -quit)
            if [ -z "$metallib" ]; then
              echo "ERROR: mlx.metallib not found in build output"
              find "target/${{ matrix.target }}/release/build" -type d -name kernels
              exit 1
            fi
            stage=$(mktemp -d)
            cp "$bin_src" "$stage/aictl"
            cp "$metallib" "$stage/mlx.metallib"
            tar -C "$stage" -czf "${{ matrix.artifact }}.tar.gz" aictl mlx.metallib
            echo "asset=${{ matrix.artifact }}.tar.gz" >> "$GITHUB_ENV"
          else
            cp "$bin_src" "${{ matrix.artifact }}"
            echo "asset=${{ matrix.artifact }}" >> "$GITHUB_ENV"
          fi

      - name: Package aictl-server
        shell: bash
        run: |
          bin_src="target/${{ matrix.target }}/release/aictl-server"
          cp "$bin_src" "${{ matrix.server_artifact }}"
          echo "server_asset=${{ matrix.server_artifact }}" >> "$GITHUB_ENV"

      - name: Upload aictl artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.asset }}

      - name: Upload aictl-server artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.server_artifact }}
          path: ${{ env.server_asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          previous_tag=$(git tag --list 'v*' --sort=-v:refname | sed -n '2p')
          if [ -n "$previous_tag" ]; then
            log=$(git log --pretty=format:'- %s (%h)' "$previous_tag".."$GITHUB_REF_NAME" -- | grep -viE '^- (Bump version to|[Uu]pdate (ISSUES|README|CLAUDE|CHANGELOG)\.md)')
          else
            log=$(git log --pretty=format:'- %s (%h)' "$GITHUB_REF_NAME" -- | grep -viE '^- (Bump version to|[Uu]pdate (ISSUES|README|CLAUDE|CHANGELOG)\.md)')
          fi
          {
            echo 'body<<EOF'
            echo "$log"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
          files: artifacts/*

  deploy-website:
    needs: release
    uses: ./.github/workflows/deploy-website.yml
    secrets: inherit
