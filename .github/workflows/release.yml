name: RELEASE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml, Cargo.lock, and website version if needed
        run: |
          current=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          tag_version="${{ steps.version.outputs.version }}"
          changed=0
          if [ "$current" != "$tag_version" ]; then
            sed -i "s/^version = \"$current\"/version = \"$tag_version\"/" Cargo.toml
            sed -i '/^name = "aictl"$/{n;s/^version = ".*"$/version = "'"$tag_version"'"/;}' Cargo.lock
            changed=1
          fi
          if ! grep -q "v$tag_version ·" website/index.html; then
            sed -i "s/v[0-9][0-9.]*\( ·[^<]*<\/div>\)/v$tag_version\1/" website/index.html
            changed=1
          fi
          if [ "$changed" = "1" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock website/index.html
            git commit -m "Bump version to $tag_version"
            git push origin HEAD:master
          fi

  build:
    needs: version-bump
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: aictl-linux-x86_64
            features: gguf
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: aictl-linux-aarch64
            features: gguf
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: aictl-darwin-x86_64
            features: gguf
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: aictl-darwin-aarch64
            features: gguf mlx
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux dependencies
        if: contains(matrix.target, 'linux')
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config cmake build-essential

      - name: Install macOS dependencies
        if: contains(matrix.os, 'macos')
        run: brew install cmake

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.features }}

      - name: Build
        run: cargo build --release --features "${{ matrix.features }}" --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/aictl ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          previous_tag=$(git tag --list 'v*' --sort=-v:refname | sed -n '2p')
          if [ -n "$previous_tag" ]; then
            log=$(git log --pretty=format:'- %s (%h)' "$previous_tag".."$GITHUB_REF_NAME" -- | grep -viE '^- (Bump version to|[Uu]pdate (ISSUES|README|CLAUDE|CHANGELOG)\.md)')
          else
            log=$(git log --pretty=format:'- %s (%h)' "$GITHUB_REF_NAME" -- | grep -viE '^- (Bump version to|[Uu]pdate (ISSUES|README|CLAUDE|CHANGELOG)\.md)')
          fi
          {
            echo 'body<<EOF'
            echo "$log"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
          files: artifacts/*

  deploy-website:
    needs: release
    uses: ./.github/workflows/deploy-website.yml
    secrets: inherit
