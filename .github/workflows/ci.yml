name: CI

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Clippy pedantic audit
      run: |
        count=$(cargo clippy -- -W clippy::all -W clippy::pedantic 2>&1 | grep -c '^warning:' || true)
        echo "## Clippy Pedantic: ${count} warning(s)" >> "$GITHUB_STEP_SUMMARY"
        if [ "$count" -gt 0 ]; then
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo clippy -- -W clippy::all -W clippy::pedantic 2>&1 | grep '^warning:' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        fi
