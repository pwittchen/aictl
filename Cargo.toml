[package]
name = "aictl"
version = "0.26.0"
edition = "2024"
description = "AI agent for the terminal"
repository = "https://github.com/pwittchen/aictl"
authors = ["Piotr Wittchen"]
license-file = "LICENSE"

[dependencies]
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.13", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
crossterm = "0.29"
indicatif = "0.18"
rustyline = "18"
termimad = "0.34"
glob = "0.3"
scraper = "0.26"
keyring = { version = "3", features = ["apple-native", "sync-secret-service"] }
base64 = "0.22"
pdf-extract = "0.10"
zip = { version = "8", default-features = false, features = ["deflate"] }
tar = "0.4"
flate2 = "1"
calamine = "0.34"
csv = "1"
futures-util = "0.3"
sha2 = "0.10"
md-5 = "0.10"
llama-cpp-2 = { version = "0.1", optional = true }
mlx-rs = { version = "0.25", optional = true }
tokenizers = { version = "0.21", optional = true, default-features = false, features = ["onig"] }
minijinja = { version = "2", optional = true, features = ["loader"] }
safetensors = { version = "0.4", optional = true }

[features]
default = []
# Native GGUF model inference via llama.cpp bindings. Disabled by default
# because it requires a C++ toolchain (cmake + a working C/C++ compiler) at
# build time. Enable with `cargo build --features gguf`.
gguf = ["dep:llama-cpp-2"]
# Native MLX model inference (Apple Silicon only). Disabled by default.
# Model management (pull / list / remove) works without the feature on any
# platform; only the actual inference path is gated. Enable with
# `cargo build --features mlx` on macOS Apple Silicon. Pulls in mlx-rs
# (Metal kernels), the HF tokenizers crate, minijinja for chat templates,
# and safetensors for direct shard parsing.
mlx = ["dep:mlx-rs", "dep:tokenizers", "dep:minijinja", "dep:safetensors"]
