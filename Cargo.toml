[package]
name = "aictl"
version = "0.2.0"
edition = "2024"
license-file = "LICENSE"

[dependencies]
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
crossterm = "0.28"
indicatif = "0.17"
rustyline = "15"
termimad = "0.30"
glob = "0.3"
scraper = "0.22"
